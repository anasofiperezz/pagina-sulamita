<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos | Administrador</title>
  <link rel="icon" href="img/angel.png" type="image/png">
  <link rel="stylesheet" href="styles.css?v=13">
</head>
<body>
  <header>
    <div class="navbar">
      <div class="logo">Papelería Sulamita - Pedidos</div>
      <div class="nav-right">
        <div class="user-badge" id="userInfo">Cargando sesión...</div>
        <a href="index.html" class="nav-btn">Inicio</a>
        <a href="admin.html" class="nav-btn">Inventario</a>
        <button class="nav-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <main>
    <section class="page-hero admin-hero">
      <div class="page-hero-content">
        <span class="page-badge">Administrador</span>
        <h1>Pedidos recibidos</h1>
        <p>
          Aquí puedes revisar las compras realizadas por clientes e invitados.
        </p>
      </div>
    </section>

    <section class="orders-admin-page">
      <div class="orders-admin-header">
        <h2 class="section-title">Lista de pedidos</h2>
        <button class="btn-outline" id="reloadOrdersBtn" type="button">
          Actualizar pedidos
        </button>
      </div>

      <div id="ordersContainer" class="orders-grid">
        <div class="info-card">
          <p>Cargando pedidos...</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Papelería Sulamita - Pedidos administrador</p>
  </footer>

  <script src="tienda.js?v=13"></script>

  <script>
    protectPage();
    protectAdminPage();
    setupHeader();

    const runningOnGitHubPages = window.location.hostname.includes("github.io");

    const reloadOrdersBtn = document.getElementById("reloadOrdersBtn");
    const ordersContainer = document.getElementById("ordersContainer");

    reloadOrdersBtn.addEventListener("click", loadAdminOrders);

    loadAdminOrders();

    async function loadAdminOrders() {
      ordersContainer.innerHTML = `
        <div class="info-card">
          <p>Cargando pedidos...</p>
        </div>
      `;

      if (runningOnGitHubPages) {
        ordersContainer.innerHTML = `
          <div class="info-card">
            <h3>Pedidos no disponibles en GitHub Pages</h3>
            <p>
              Esta sección necesita el servidor Node.js porque carga datos desde
              <strong>/api/pedidos</strong>. Para ver pedidos reales, usa la página publicada en Render.
            </p>
          </div>
        `;
        return;
      }

      try {
        reloadOrdersBtn.disabled = true;
        reloadOrdersBtn.textContent = "Cargando...";

        const response = await fetch("/api/pedidos");
        const orders = await response.json();

        if (!response.ok) {
          ordersContainer.innerHTML = `
            <div class="info-card">
              <h3>No se pudieron cargar los pedidos</h3>
              <p>${safeHtml(orders.message || "Intenta actualizar nuevamente.")}</p>
            </div>
          `;
          return;
        }

        if (!Array.isArray(orders) || !orders.length) {
          ordersContainer.innerHTML = `
            <div class="info-card">
              <p>No hay pedidos registrados todavía.</p>
            </div>
          `;
          return;
        }

        ordersContainer.innerHTML = orders.map(renderOrderCard).join("");
      } catch (error) {
        console.error("Error cargando pedidos:", error);

        ordersContainer.innerHTML = `
          <div class="info-card">
            <h3>Error al cargar pedidos</h3>
            <p>No se pudo conectar con el servidor.</p>
          </div>
        `;
      } finally {
        reloadOrdersBtn.disabled = false;
        reloadOrdersBtn.textContent = "Actualizar pedidos";
      }
    }

    function renderOrderCard(order) {
      const productosHtml = Array.isArray(order.productos) && order.productos.length
        ? order.productos.map(item => `
            <li>
              Producto ID: <strong>${safeHtml(item.producto_id)}</strong> |
              Talla/Opción: <strong>${safeHtml(item.talla || "Sin talla")}</strong> |
              Cantidad: <strong>${safeHtml(item.cantidad)}</strong> |
              Precio: <strong>${formatMoney(item.precio || 0)}</strong>
            </li>
          `).join("")
        : "<li>Sin detalle de productos</li>";

      const fecha = order.creado_en
        ? new Date(order.creado_en).toLocaleString("es-MX")
        : "Sin fecha";

      return `
        <article class="order-card">
          <div class="order-card-top">
            <h3>Pedido #${safeHtml(order.id)}</h3>
            <span class="order-status">${safeHtml(order.estado || "pendiente")}</span>
          </div>

          <div class="order-card-body">
            <p><strong>Cliente:</strong> ${safeHtml(order.nombre_cliente || "")}</p>
            <p><strong>Correo:</strong> ${safeHtml(order.email_cliente || "")}</p>
            <p><strong>Teléfono:</strong> ${safeHtml(order.telefono_cliente || "No registrado")}</p>
            <p><strong>Entrega:</strong> ${safeHtml(formatDelivery(order.tipo_entrega))}</p>
            <p><strong>Dirección:</strong> ${safeHtml(order.direccion_envio || "No aplica")}</p>
            <p><strong>Pago:</strong> ${safeHtml(formatPayment(order.metodo_pago))}</p>
            <p><strong>Subtotal:</strong> ${formatMoney(order.subtotal || 0)}</p>
            <p><strong>Envío:</strong> ${formatMoney(order.envio || 0)}</p>
            <p><strong>Total:</strong> ${formatMoney(order.total || 0)}</p>
            <p><strong>Fecha:</strong> ${safeHtml(fecha)}</p>

            <div class="order-products">
              <h4>Productos</h4>
              <ul>
                ${productosHtml}
              </ul>
            </div>
          </div>
        </article>
      `;
    }

    function formatDelivery(value) {
      if (value === "delivery") return "Envío a domicilio";
      if (value === "pickup") return "Recoger en papelería";
      return value || "";
    }

    function formatPayment(value) {
      if (value === "efectivo") return "Efectivo";
      if (value === "transferencia") return "Transferencia";
      if (value === "tarjeta") return "Tarjeta";
      return value || "";
    }

    function safeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
