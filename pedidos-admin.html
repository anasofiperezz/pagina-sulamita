<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos | Administrador</title>
  <link rel="icon" href="img/angel.png" type="image/png">
  <link rel="stylesheet" href="styles.css?v=21">
</head>
<body>
  <header>
    <div class="navbar">
      <div class="logo">Papelería Sulamita - Pedidos</div>
      <div class="nav-right">
        <div class="user-badge" id="userInfo">Cargando sesión...</div>
        <a href="index.html" class="nav-btn">Inicio</a>
        <a href="admin.html" class="nav-btn">Inventario</a>
        <button class="nav-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <main>
    <section class="page-hero admin-hero">
      <div class="page-hero-content">
        <span class="page-badge">Administrador</span>
        <h1>Pedidos recibidos</h1>
        <p>
          Aquí puedes revisar las compras realizadas, cambiar estados,
          eliminar pedidos y consultar pago/facturación.
        </p>
      </div>
    </section>

    <section class="orders-admin-page">
      <div class="orders-admin-header">
        <h2 class="section-title">Lista de pedidos</h2>
        <button class="btn-outline" id="reloadOrdersBtn" type="button">
          Actualizar pedidos
        </button>
      </div>

      <div id="ordersContainer" class="orders-grid">
        <div class="info-card">
          <p>Cargando pedidos...</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Papelería Sulamita - Pedidos administrador</p>
  </footer>

  <script src="tienda.js?v=22"></script>

  <script>
    protectPage();
    protectAdminPage();
    setupHeader();

    const runningOnGitHubPages = window.location.hostname.includes("github.io");

    const reloadOrdersBtn = document.getElementById("reloadOrdersBtn");
    const ordersContainer = document.getElementById("ordersContainer");

    reloadOrdersBtn.addEventListener("click", loadAdminOrders);

    loadAdminOrders();

    async function loadAdminOrders() {
      ordersContainer.innerHTML = `
        <div class="info-card">
          <p>Cargando pedidos...</p>
        </div>
      `;

      if (runningOnGitHubPages) {
        ordersContainer.innerHTML = `
          <div class="info-card">
            <h3>Pedidos no disponibles en GitHub Pages</h3>
            <p>
              Esta sección necesita el servidor Node.js porque carga datos desde
              <strong>/api/pedidos</strong>. Para ver pedidos reales, usa la página publicada en Render.
            </p>
          </div>
        `;
        return;
      }

      try {
        reloadOrdersBtn.disabled = true;
        reloadOrdersBtn.textContent = "Cargando...";

        const response = await fetch("/api/pedidos");
        const orders = await response.json();

        if (!response.ok) {
          ordersContainer.innerHTML = `
            <div class="info-card">
              <h3>No se pudieron cargar los pedidos</h3>
              <p>${safeHtml(orders.message || "Intenta actualizar nuevamente.")}</p>
            </div>
          `;
          return;
        }

        if (!Array.isArray(orders) || !orders.length) {
          ordersContainer.innerHTML = `
            <div class="info-card">
              <p>No hay pedidos registrados todavía.</p>
            </div>
          `;
          return;
        }

        ordersContainer.innerHTML = orders.map(renderOrderCard).join("");
      } catch (error) {
        console.error("Error cargando pedidos:", error);

        ordersContainer.innerHTML = `
          <div class="info-card">
            <h3>Error al cargar pedidos</h3>
            <p>No se pudo conectar con el servidor.</p>
          </div>
        `;
      } finally {
        reloadOrdersBtn.disabled = false;
        reloadOrdersBtn.textContent = "Actualizar pedidos";
      }
    }

    function renderOrderCard(order) {
      const productosHtml = Array.isArray(order.productos) && order.productos.length
        ? order.productos.map(item => `
            <li>
              <strong>${safeHtml(item.nombre || "Producto ID: " + item.producto_id)}</strong><br>
              Categoría: <strong>${safeHtml(item.categoria || "Sin categoría")}</strong> |
              Talla/Opción: <strong>${safeHtml(item.talla || "Sin talla")}</strong> |
              Cantidad: <strong>${safeHtml(item.cantidad)}</strong> |
              Precio: <strong>${formatMoney(item.precio || 0)}</strong>
            </li>
          `).join("")
        : "<li>Sin detalle de productos</li>";

      const fecha = order.creado_en
        ? new Date(order.creado_en).toLocaleString("es-MX")
        : "Sin fecha";

      const facturaHtml = renderInvoiceInfo(order);
      const estadoActual = order.estado || "pendiente";

      return `
        <article class="order-card">
          <div class="order-card-top">
            <h3>Pedido #${safeHtml(order.id)}</h3>
            <span class="order-status status-${safeHtml(estadoActual)}" id="order-status-badge-${safeHtml(order.id)}">
              ${safeHtml(estadoActual)}
            </span>
          </div>

          <div class="order-status-controls">
            <label for="order-status-select-${safeHtml(order.id)}">
              Cambiar estado
            </label>

            <select id="order-status-select-${safeHtml(order.id)}">
              <option value="pendiente" ${estadoActual === "pendiente" ? "selected" : ""}>Pendiente</option>
              <option value="listo" ${estadoActual === "listo" ? "selected" : ""}>Listo</option>
              <option value="entregado" ${estadoActual === "entregado" ? "selected" : ""}>Entregado</option>
              <option value="cancelado" ${estadoActual === "cancelado" ? "selected" : ""}>Cancelado</option>
            </select>

            <button
              type="button"
              class="btn-outline btn-sm"
              onclick="updateOrderStatus(${Number(order.id)})"
            >
              Guardar estado
            </button>

            <button
              type="button"
              class="btn-danger btn-sm"
              onclick="deleteOrder(${Number(order.id)})"
            >
              Eliminar pedido
            </button>
          </div>

          <div class="order-card-body">
            <p><strong>Cliente:</strong> ${safeHtml(order.nombre_cliente || "")}</p>
            <p><strong>Correo:</strong> ${safeHtml(order.email_cliente || "")}</p>
            <p><strong>Teléfono:</strong> ${safeHtml(order.telefono_cliente || "No registrado")}</p>
            <p><strong>Entrega:</strong> ${safeHtml(formatDelivery(order.tipo_entrega))}</p>
            <p>
              <strong>Dirección:</strong><br>
              ${formatMultiline(order.direccion_envio || "No aplica")}
            </p>
            <p><strong>Método de pago:</strong> ${safeHtml(formatPayment(order.metodo_pago))}</p>

            ${renderPaymentNote(order.metodo_pago)}

            <hr>

            <p><strong>Subtotal:</strong> ${formatMoney(order.subtotal || 0)}</p>
            <p><strong>Envío:</strong> ${formatMoney(order.envio || 0)}</p>
            <p><strong>Descuento:</strong> ${formatMoney(order.descuento || 0)}</p>
            <p><strong>Total:</strong> ${formatMoney(order.total || 0)}</p>
            <p><strong>Fecha:</strong> ${safeHtml(fecha)}</p>

            ${facturaHtml}

            <div class="order-products">
              <h4>Productos</h4>
              <ul>
                ${productosHtml}
              </ul>
            </div>
          </div>
        </article>
      `;
    }

    async function updateOrderStatus(orderId) {
      const select = document.getElementById(`order-status-select-${orderId}`);
      const badge = document.getElementById(`order-status-badge-${orderId}`);

      if (!select) return;

      const newStatus = select.value;

      try {
        const response = await fetch(`/api/pedidos/${orderId}/estado`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            estado: newStatus
          })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "No se pudo actualizar el estado.");
          return;
        }

        if (badge) {
          badge.textContent = newStatus;
          badge.className = `order-status status-${newStatus}`;
        }

        alert("Estado actualizado correctamente.");
      } catch (error) {
        console.error("Error actualizando estado:", error);
        alert("No se pudo conectar con el servidor.");
      }
    }

    async function deleteOrder(orderId) {
      const confirmDelete = confirm(
        `¿Seguro que quieres eliminar el pedido #${orderId}? Esta acción no se puede deshacer.`
      );

      if (!confirmDelete) return;

      const restoreStock = confirm(
        "¿Quieres restaurar el stock de los productos de este pedido?"
      );

      try {
        const response = await fetch(
          `/api/pedidos/${orderId}?restaurar_stock=${restoreStock ? "si" : "no"}`,
          {
            method: "DELETE"
          }
        );

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "No se pudo eliminar el pedido.");
          return;
        }

        alert(data.message || "Pedido eliminado correctamente.");
        loadAdminOrders();
      } catch (error) {
        console.error("Error eliminando pedido:", error);
        alert("No se pudo conectar con el servidor.");
      }
    }

    function renderPaymentNote(paymentMethod) {
      if (paymentMethod === "transferencia") {
        return `
          <div class="payment-info-card">
            <h4>Pago por transferencia</h4>
            <p>
              Revisar si el pedido corresponde a uniformes/papelería/higiene o libros de texto
              para confirmar la cuenta correcta.
            </p>
          </div>
        `;
      }

      if (paymentMethod === "tarjeta") {
        return `
          <div class="payment-info-card">
            <h4>Pago con tarjeta</h4>
            <p>
              Confirmar con el cliente el proceso para pago con tarjeta.
              No solicitar datos bancarios por esta página.
            </p>
          </div>
        `;
      }

      if (paymentMethod === "efectivo") {
        return `
          <div class="payment-info-card">
            <h4>Pago en efectivo</h4>
            <p>
              El cliente pagará al recibir o al recoger el pedido.
            </p>
          </div>
        `;
      }

      return "";
    }

    function renderInvoiceInfo(order) {
      if (!order.requiere_factura) {
        return `
          <div class="payment-info-card">
            <h4>Facturación</h4>
            <p>No requiere factura.</p>
          </div>
        `;
      }

      const datos = order.datos_factura || {};

      return `
        <div class="payment-info-card">
          <h4>Datos para factura</h4>

          <p><strong>Uso de CFDI:</strong> ${safeHtml(datos.uso_cfdi || "")}</p>
          <p><strong>Modo de pago:</strong> ${safeHtml(datos.modo_pago_factura || "")}</p>
          <p><strong>Correo para factura:</strong> ${safeHtml(datos.correo_factura || "")}</p>

          <p>
            <strong>Constancia fiscal:</strong>
            ${
              datos.constancia_fiscal_url
                ? `<a href="${safeHtml(datos.constancia_fiscal_url)}" target="_blank">Ver archivo</a>`
                : "No subida"
            }
          </p>

          <p>
            <strong>Nota de compra:</strong>
            ${
              datos.nota_compra_url
                ? `<a href="${safeHtml(datos.nota_compra_url)}" target="_blank">Ver archivo</a>`
                : "No subida"
            }
          </p>

          <p>
            <strong>Voucher tarjeta:</strong>
            ${
              datos.voucher_url
                ? `<a href="${safeHtml(datos.voucher_url)}" target="_blank">Ver archivo</a>`
                : "No aplica / No subido"
            }
          </p>
        </div>
      `;
    }

    function formatDelivery(value) {
      if (value === "delivery") return "Envío a domicilio";
      if (value === "pickup") return "Recoger en papelería";
      return value || "";
    }

    function formatPayment(value) {
      if (value === "efectivo") return "Efectivo contraentrega";
      if (value === "contra_entrega") return "Pago al recibir / recoger";
      if (value === "transferencia") return "Transferencia";
      if (value === "tarjeta") return "Tarjeta";
      return value || "";
    }

    function safeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatMultiline(value) {
      return safeHtml(value).replaceAll("\n", "<br>");
    }
  </script>
</body>
</html>
